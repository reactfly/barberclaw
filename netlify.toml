[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/public-runtime-config"
  to = "/.netlify/functions/public-runtime-config"
  status = 200

[[redirects]]
  from = "/api/public-booking-availability"
  to = "/.netlify/functions/public-booking-availability"
  status = 200

[[redirects]]
  from = "/api/public-booking"
  to = "/.netlify/functions/public-booking"
  status = 200

[[redirects]]
  from = "/api/invite-staff"
  to = "/.netlify/functions/invite-staff"
  status = 200

[[redirects]]
  from = "/api/platform-plans"
  to = "/.netlify/functions/platform-plans"
  status = 200

[[redirects]]
  from = "/api/platform-transactions"
  to = "/.netlify/functions/platform-transactions"
  status = 200

[[redirects]]
  from = "/api/platform-tickets"
  to = "/.netlify/functions/platform-tickets"
  status = 200

[[redirects]]
  from = "/api/platform-notifications"
  to = "/.netlify/functions/platform-notifications"
  status = 200

[[redirects]]
  from = "/api/platform-content"
  to = "/.netlify/functions/platform-content"
  status = 200

[[redirects]]
  from = "/api/platform-audit-logs"
  to = "/.netlify/functions/platform-audit-logs"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
