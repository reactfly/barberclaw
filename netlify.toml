[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/public-runtime-config"
  to = "/.netlify/functions/public-runtime-config"
  status = 200

[[redirects]]
  from = "/api/public-booking-availability"
  to = "/.netlify/functions/public-booking-availability"
  status = 200

[[redirects]]
  from = "/api/public-booking"
  to = "/.netlify/functions/public-booking"
  status = 200

[[redirects]]
  from = "/api/invite-staff"
  to = "/.netlify/functions/invite-staff"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
